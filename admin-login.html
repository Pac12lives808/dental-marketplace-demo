<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Dental Dash Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111827;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand h1 { font-size: 22px; color: #1d4ed8; margin: 0 0 4px; }
    .brand p { font-size: 13px; color: #6b7280; margin: 0; }
    label { display: block; margin: 16px 0 6px; font-size: 14px; font-weight: 600; color: #374151; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
    }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .error {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 14px;
      border: 1px solid #fecaca;
    }
    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
  </style>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
</head>
<body>
<div class="card">
  <div class="brand">
    <h1>Dental Dash Pro</h1>
    <p>Admin Portal</p>
  </div>
  <form id="loginForm">
    <label for="email">Email</label>
    <input id="email" type="email" required placeholder="admin@dentaldash.com" />
    <label for="password">Password</label>
    <input id="password" type="password" required />
    <div id="errorBox" class="error"></div>
    <button id="loginBtn" type="submit">Sign In</button>
  </form>
</div>
<script type="module">
  import { supabase } from "./supabase-config.js";
  const form = document.getElementById("loginForm");
  const loginBtn = document.getElementById("loginBtn");
  const errorBox = document.getElementById("errorBox");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in...";
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      errorBox.textContent = error.message || "Login failed.";
      errorBox.style.display = "block";
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign In";
      return;
    }
    window.location.href = "./admin-approvals.html";
  });
</script>
</body>
</html>
