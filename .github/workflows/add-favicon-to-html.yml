name: Add Favicon Tags to All HTML Files

on:
  workflow_dispatch:

jobs:
  add-favicons:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add favicon link tags to all HTML files
        run: |
          FAVICON_TAGS='    <link rel="icon" type="image/x-icon" href="/favicon.ico">\n    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">\n    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">'

          # Find all HTML files in root and tools/ subdirectory
          find . -maxdepth 2 -name '*.html' ! -path './.github/*' | while read file; do
            # Skip if favicon already added
            if grep -q 'favicon.ico' "$file"; then
              echo "Skipping $file (already has favicon)"
              continue
            fi
            # Insert before </head>
            sed -i "s|</head>|${FAVICON_TAGS}\n</head>|" "$file"
            echo "Updated $file"
          done

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m 'Add favicon link tags to all HTML files'
          git push
