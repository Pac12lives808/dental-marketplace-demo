<!DOCTYPE html>
<html lang="en">
<head>
      <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLK6GWSVB4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PLK6GWSVB4');
      gtag('event', 'view_office_signup');
    </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <title>Dental Dash Pro — Office Application</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--surface);      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      width: 100%;
      max-width: 640px;
      background: #var(--surface-card);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      padding: 36px 28px;
    }    h1 { margin: 0 0 8px; font-size: 28px; color: #var(--text-dark); }
    .subtitle { margin: 0 0 28px; color: #var(--text-muted); font-size: 15px; }
    .grid { display: grid; gap: 18px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label { display: block; font-size: 14px; font-weigh: 600; color: #374151; margin-bottom: 6px; }
    input, select {      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }
    input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .error {
      display: none;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      background: #fef2f2;
      color: #b91c1c;
      font-size: 14px;
      border: 1px solid #fecaca;
    }
    button[type="submit"] {
      margin-top: 8px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #1d4ed8; }
    button[type="submit"]:disabled { opacity: 0.65; cursor: not-allowed; }
    @media (max-width: 580px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

    <div class="card">
        <h1>Join the Provider Network</h1>
        <p class="subtitle">Complete the application below to start receiving patient leads.</p>

        <div id="errorMsg" class="error"></div>

        <form id="signupForm">
            <div class="grid">
                <div class="row">
                    <div>
                        <label for="full_name">Contact Name</label>
                        <input type="text" id="full_name" name="full_name" placeholder="Dr. Jane Smith" required autocomplete="name" maxlength="100">
                    </div>
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="drsmith@office.com" required autocomplete="email" inputmode="email" maxlength="254">
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" required autocomplete="tel" inputmode="tel" maxlength="30">
                    </div>
                    <div>
                        <label for="dental_license_number">Dental License #</label>
                        <input type="text" id="dental_license_number" name="dental_license_number" placeholder="License Number" required autocomplete="off" maxlength="50">
                    </div>
                </div>

                <div>
                    <label for="practice_name">Practice Name</label>
                    <input type="text" id="practice_name" name="practice_name" placeholder="City Dental Care" required autocomplete="organization" maxlength="150">
                </div>

                <div>
                    <label for="specialty">Practice Specialty</label>
                    <select id="specialty" name="specialty" required>
                        <option value="">Select Specialty...</option>
                        <option value="General Dentistry">General Dentistry</option>
                        <option value="Orthodontics">Orthodontics</option>
                        <option value="Oral Surgery">Oral Surgery</option>
                        <option value="Endodontics">Endodontics</option>
                        <option value="Pediatric Dentistry">Pediatric Dentistry</option>
                        <option value="Periodontics">Periodontics</option>
                    </select>
                </div>

                <div class="row">
                    <div>
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="San Francisco" required autocomplete="address-level2" maxlength="100">
                    </div>
                    <div>
                        <label for="state">State</label>
                        <select id="state" name="state" required autocomplete="address-level1">
                            <option value="">Select State...</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="website">Practice Website (Optional)</label>
                    <input type="url" id="website" name="website" placeholder="https://www.example.com" autocomplete="url" maxlength="200">
                </div>

                <button type="submit" id="submitBtn">Submit Application</button>
            </div>
        </form>

        <footer>
            Already have an account? <a href="admin-login.html">Log in here</a>
        </footer>
    </div>

<script type="module">
  import { supabase } from "./supabase-config.js";

  const form = document.getElementById("signupForm");
  const submitBtn = document.getElementById("submitBtn");
  const errorMsg = document.getElementById("errorMsg");

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function clearError() {
    errorMsg.textContent = "";
    errorMsg.style.display = "none";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearError();

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const fd = new FormData(form);
    const payload = {
      full_name: String(fd.get("full_name") || "").trim(),
      email: String(fd.get("email") || "").trim().toLowerCase(),
      phone: String(fd.get("phone") || "").trim(),
      practice_name: String(fd.get("practice_name") || "").trim(),
      city: String(fd.get("city") || "").trim(),
      state: String(fd.get("state") || "").trim(),
      dental_license_number: String(fd.get("dental_license_number") || "").trim(),
      specialty: String(fd.get("specialty") || "").trim(),
      website: String(fd.get("website") || "").trim() || null,
      status: "PENDING"
    };

    const requiredFields = ["full_name", "email", "phone", "practice_name", "city", "state", "dental_license_number", "specialty"];
    for (const field of requiredFields) {
      if (!payload[field]) {
        showError("Please fill in all required fields.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit Application";
        return;
      }
    }

    const { error } = await supabase.from("office_applications").insert([payload]);
    if (error) {
      showError(error.message || "Submission failed. Please try again.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Application";
      return;
    }

    // Fire-and-forget: send confirmation email via Edge Function
    fetch('https://fxfwytxfeuwsbeapiyqw.supabase.co/functions/v1/send-application-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name: payload.full_name,
        email: payload.email,
        phone: payload.phone,
        practice_name: payload.practice_name,
        city: payload.city,
        state: payload.state,
        specialty: payload.specialty,
        dental_license_number: payload.dental_license_number
      })
    }).catch(() => {}); // non-blocking, do not delay redirect

    gtag('event', 'submit_office_application');
    window.location.href = "./office-pending.html";
  });
</script>
</body>
</html>
