<!DOCTYPE html>
<html lang="en">
<head>
        <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLK6GWSVB4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PLK6GWSVB4');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Application - Dental Dash Pro</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg-body: #f4f7f9;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --text-main: #24292e;
            --text-muted: #6a737d;
            --radius-lg: 16px;
            --radius-md: 8px;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 640px;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 48px;
            border: 1px solid var(--border-color);
        }

        h1 { margin: 0 0 8px; font-size: 1.75rem; color: var(--text-main); font-weight: 700; }
        .subtitle { margin: 0 0 32px; color: var(--text-muted); font-size: 15px; }

        .grid { display: grid; gap: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-main); 
            margin-bottom: 8px; 
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 15px;
            background: #fff;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1); 
        }

        .error {
            display: none;
            margin-bottom: 24px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: #fff5f5;
            color: #c53030;
            font-size: 14px;
            border: 1px solid #feb2b2;
        }

        button[type="submit"] {
            margin-top: 12px;
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"]:hover { background: var(--primary-hover); }
        button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

        footer { margin-top: 32px; text-align: center; color: var(--text-muted); font-size: 13px; }
        footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Join the Provider Network</h1>
        <p class="subtitle">Complete the application below to start receiving patient leads.</p>

        <div id="errorMsg" class="error"></div>

        <form id="signupForm">
            <div class="grid">
                <div class="row">
                    <div>
                        <label for="full_name">Contact Name</label>
                        <input type="text" id="full_name" placeholder="Dr. Jane Smith" required>
                    </div>
                    <div>
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="drsmith@office.com" required>
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="(555) 000-0000" required>
                    </div>
                    <div>
                        <label for="dental_license_number">Dental License #</label>
                        <input type="text" id="dental_license_number" placeholder="License Number" required>
                    </div>
                </div>

                <div>
                    <label for="practice_name">Practice Name</label>
                    <input type="text" id="practice_name" placeholder="City Dental Care" required>
                </div>

                <div>
                    <label for="specialty">Practice Specialty</label>
                    <select id="specialty" required>
                        <option value="">Select Specialty...</option>
                        <option value="General Dentistry">General Dentistry</option>
                        <option value="Orthodontics">Orthodontics</option>
                        <option value="Oral Surgery">Oral Surgery</option>
                        <option value="Endodontics">Endodontics</option>
                        <option value="Pediatric Dentistry">Pediatric Dentistry</option>
                        <option value="Periodontics">Periodontics</option>
                    </select>
                </div>

                <div class="row">
                    <div>
                        <label for="city">City</label>
                        <input type="text" id="city" placeholder="San Francisco" required>
                    </div>
                    <div>
                        <label for="state">State</label>
                        <select id="state" required>
                            <option value="">Select State...</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="website">Practice Website (Optional)</label>
                    <input type="url" id="website" placeholder="https://www.example.com">
                </div>

                <button type="submit" id="submitBtn">Submit Application</button>
            </div>
        </form>

        <footer>
            Already have an account? <a href="admin-login.html">Log in here</a>
        </footer>
    </div>

    <script type="module">
        import { supabase } from "./supabase-config.js";

        const form = document.getElementById("signupForm");
        const submitBtn = document.getElementById("submitBtn");
        const errorMsg = document.getElementById("errorMsg");

        form.onsubmit = async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            errorMsg.style.display = "none";

            const formData = {
                full_name: document.getElementById("full_name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                dental_license_number: document.getElementById("dental_license_number").value,
                practice_name: document.getElementById("practice_name").value,
                specialty: document.getElementById("specialty").value,
                city: document.getElementById("city").value,
                state: document.getElementById("state").value,
                website: document.getElementById("website").value || null,
                status: "PENDING"
            };

            const { data, error } = await supabase
                .from("office_applications")
                .insert([formData]);

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = "block";
                submitBtn.disabled = false;
            } else {
                window.location.href = "office-pending.html";
            }
        };
    </script>
</body>
</html>
