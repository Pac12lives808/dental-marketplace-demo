<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit a Request - Dental Dash Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a href="index.html" style="color:white;text-decoration:none;">Dental Dash Pro</a></h1>
    <p>Submit a Treatment Request</p>
  </header>
  <main>
    <form action="success.html" method="get">
      <h2>Request Dental Treatment Bids</h2>
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="(480) 555-0100">

      <label for="zip">ZIP Code</label>
      <input type="text" id="zip" name="zip" placeholder="85234" required>

      <label for="treatment">Treatment Needed</label>
      <select id="treatment" name="treatment" required>
        <option value="">Select treatment type...</option>
        <option value="cleaning">Cleaning &amp; Exam</option>
        <option value="filling">Cavity Filling</option>
        <option value="crown">Crown</option>
        <option value="root-canal">Root Canal</option>
        <option value="extraction">Tooth Extraction</option>
        <option value="implant">Dental Implant</option>
        <option value="whitening">Teeth Whitening</option>
        <option value="other">Other</option>
      </select>

      <label for="insurance">Insurance (if any)</label>
      <input type="text" id="insurance" name="insurance" placeholder="Delta Dental, Cigna, None, etc.">

      <label for="notes">Additional Notes</label>
      <textarea id="notes" name="notes" rows="4" placeholder="Any additional information about your dental needs..."></textarea>

      <button type="submit">Submit Request</button>

      <div class="nav-links">
        <a href="get-started.html">&larr; Back</a>
        <a href="index.html">Home</a>
      </div>
    </form>
  </main>
  <footer>
    <p>&copy; 2026 Dental Dash Pro. All rights reserved.</p>
  </footer>
</body>
</html>
