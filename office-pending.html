<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Received - Dental Dash Pro</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg-body: #f4f7f9;
            --bg-card: #ffffff;
            --border-color: #e1e4e8;
            --text-main: #24292e;
            --text-muted: #6a737d;
            --radius-lg: 16px;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-body);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 56px 40px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .icon { 
            font-size: 64px; 
            margin-bottom: 24px; 
            color: #28a745;
        }

        h1 { 
            font-size: 1.5rem; 
            color: var(--text-main); 
            margin: 0 0 12px; 
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            margin: 0 0 24px;
            padding: 6px 16px;
            border-radius: 999px;
            background: #fff3cd;
            color: #856404;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        p { 
            color: var(--text-muted); 
            font-size: 15px; 
            line-height: 1.6; 
            margin: 0 0 16px; 
        }

        .back-link { margin-top: 32px; }
        a { 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 14px; 
        }
        a:hover { color: var(--primary-hover); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Application Received</h1>
        <div class="badge">Pending Review</div>
        <p>Your dental office application has been submitted successfully.</p>
        <p>Our verification team will review your credentials and practice details. This process usually takes 1-2 business days.</p>
        <div class="back-link">
            <a href="for-dentists.html">&larr; Back to Provider Portal</a>
        </div>
    </div>
</body>
</html>
