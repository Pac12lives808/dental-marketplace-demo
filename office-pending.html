<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Received — Dental Dash Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f7fb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      padding: 52px 36px;
      text-align: center;
    }
    .icon { font-size: 64px; line-height: 1; margin-bottom: 20px; }
    h1 { font-size: 26px; color: #111827; margin: 0 0 14px; }
    .badge {
      display: inline-block;
      margin: 0 0 24px;
      padding: 8px 20px;
      border-radius: 999px;
      background: #fef3c7;
      color: #92400e;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
      border: 1px solid #fde68a;
    }
    p { color: #4b5563; font-size: 15px; line-height: 1.65; margin: 0 0 10px; }
    .back-link { margin-top: 28px; }
    a { color: #2563eb; text-decoration: none; font-weight: 600; font-size: 14px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Application Received</h1>
  <div class="badge">PENDING REVIEW</div>
  <p>Your office application has been submitted successfully.</p>
  <p>Our team will review your information and follow up after verification. This typically takes 2–3 business days.</p>
  <div class="back-link">
    <a href="./for-dentists.html">← Back to For Dentists</a>
  </div>
</div>
</body>
</html>
