<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Approvals — Dental Dash Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f9fafb;
      padding: 32px 16px;
      color: #111827;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
    .topbar h1 { margin: 0; font-size: 24px; }
    .logout-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .logout-btn:hover { background: #374151; }
    .status-filter { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    }
    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th { background: #f3f4f6; font-weight: 700; color: #374151; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }
    a { color: #2563eb; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-PENDING { background: #fef3c7; color: #92400e; }
    .badge-APPROVED { background: #d1fae5; color: #065f46; }
    .badge-REJECTED { background: #fee2e2; color: #991b1b; }
    .empty {
      background: #fff;
      border-radius: 14px;
      padding: 40px 24px;
      text-align: center;
      color: #6b7280;
      box-shadow: 0 6px 22px rgba(0,0,0,0.06);
    }
    #loading { text-align: center; padding: 40px; color: #6b7280; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Office Applications</h1>
    <button class="logout-btn" id="logoutBtn">Log Out</button>
  </div>
  <div class="status-filter">
    <button class="filter-btn active" data-status="ALL">All</button>
    <button class="filter-btn" data-status="PENDING">Pending</button>
    <button class="filter-btn" data-status="APPROVED">Approved</button>
    <button class="filter-btn" data-status="REJECTED">Rejected</button>
  </div>
  <div id="loading">Loading applications...</div>
  <div id="emptyState" class="empty" style="display:none;">No applications found.</div>
  <table id="appsTable" style="display:none;">
    <thead>
      <tr>
        <th>Created</th>
        <th>Practice</th>
        <th>Contact</th>
        <th>Location</th>
        <th>Specialty</th>
        <th>Status</th>
        <th>Review</th>
      </tr>
    </thead>
    <tbody id="appsBody"></tbody>
  </table>
</div>
<script type="module">
  import { supabase } from "./supabase-config.js";
  let allApps = [];
  let currentFilter = "ALL";
  async function ensureLoggedIn() {
    const { data } = await supabase.auth.getSession();
    if (!data.session) { window.location.href = "./admin-login.html"; return false; }
    return true;
  }
  async function loadApplications() {
    const ok = await ensureLoggedIn();
    if (!ok) return;
    const { data, error } = await supabase
      .from("office_applications")
      .select("*")
      .order("created_at", { ascending: false });
    document.getElementById("loading").style.display = "none";
    if (error) { alert(error.message || "Failed to load applications."); return; }
    allApps = data || [];
    renderTable();
  }
  function renderTable() {
    const filtered = currentFilter === "ALL" ? allApps : allApps.filter(a => a.status === currentFilter);
    const body = document.getElementById("appsBody");
    const table = document.getElementById("appsTable");
    const empty = document.getElementById("emptyState");
    body.innerHTML = "";
    if (filtered.length === 0) {
      empty.style.display = "block";
      table.style.display = "none";
      return;
    }
    empty.style.display = "none";
    table.style.display = "table";
    for (const app of filtered) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${new Date(app.created_at).toLocaleDateString()}</td>
        <td><strong>${app.practice_name}</strong></td>
        <td>${app.full_name}<br><small>${app.email}</small><br><small>${app.phone}</small></td>
        <td>${app.city}, ${app.state}</td>
        <td>${app.specialty}</td>
        <td><span class="badge badge-${app.status}">${app.status}</span></td>
        <td><a href="./admin-office-review.html?id=${app.id}">Review</a></td>
      `;
      body.appendChild(tr);
    }
  }
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.status;
      renderTable();
    });
  });
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = "./admin-login.html";
  });
  loadApplications();
</script>
</body>
</html>
