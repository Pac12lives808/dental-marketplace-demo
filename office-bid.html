<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLK6GWSVB4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PLK6GWSVB4');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Review | DentalDash Pro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --primary-blue: #0f1c2e;
      --accent-blue: #3b82f6;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bg-light: #f8fafc;
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }
    body {
      background-color: #f1f5f9;
      margin: 0;
      padding-top: 64px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 1000;
    }
    .logo { font-weight: 800; color: var(--accent-blue); font-size: 1.25rem; text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-link { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    .bid-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px 120px;
    }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: var(--card-shadow);
    }
    .card-title { font-size: 1.25rem; font-weight: 700; color: var(--primary-blue); margin: 0 0 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      color: #1a202c;
      background: #fff;
      box-sizing: border-box;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .actions-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      padding: 20px 40px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: flex-end;
      gap: 16px;
      z-index: 1000;
    }
    .btn { padding: 14px 28px; border-radius: 12px; font-weight: 600; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; font-size: 1rem; }
    .btn-outline { background: white; border: 2px solid #e2e8f0; color: var(--text-main); }
    .btn-primary { background: var(--accent-blue); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .case-info {
      background: #eff6ff;
      padding: 16px 20px;
      border-radius: 10px;
      border-left: 4px solid var(--accent-blue);
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: var(--text-main);
    }
    #errorMsg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-left: 4px solid #ef4444;
      border-radius: 10px;
      padding: 12px 16px;
      color: #b91c1c;
      font-size: 0.9rem;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="office-dashboard.html" class="logo">DentalDash</a>
    <div class="nav-links">
      <a href="office-dashboard.html" class="nav-link">Dashboard</a>
      <a href="office-cases.html" class="nav-link">Patient Cases</a>
      <a href="#" class="nav-link">Settings</a>
    </div>
  </nav>

  <div class="bid-container">
    <div id="caseInfoBanner" class="case-info">Loading case information...</div>

    <div class="card">
      <div class="card-title">Estimate Details</div>
      <div class="form-row">
        <div class="form-group">
          <label>Low Estimate ($) *</label>
          <input type="number" id="estimate_low" name="estimate_low" class="form-input" placeholder="2500" min="0" step="0.01" required>
        </div>
        <div class="form-group">
          <label>High Estimate ($) *</label>
          <input type="number" id="estimate_high" name="estimate_high" class="form-input" placeholder="3200" min="0" step="0.01" required>
        </div>
      </div>
      <div class="form-group">
        <label>Treatment Approach *</label>
        <textarea id="treatment_approach" name="treatment_approach" class="form-input" rows="4" placeholder="Describe the recommended treatment plan..."></textarea>
      </div>
      <div class="form-group">
        <label>Payment Options (Optional)</label>
        <input type="text" id="payment_options" name="payment_options" class="form-input" placeholder="e.g., CareCredit, Payment Plans">
      </div>
      <div class="form-group">
        <label>Availability Notes (Optional)</label>
        <input type="text" id="availability_notes" name="availability_notes" class="form-input" placeholder="e.g., Available next week, Monday-Friday">
      </div>
    </div>

    <div class="card">
      <div class="card-title">Submitting Office Contact</div>
      <div class="form-group">
        <label>Your Name *</label>
        <input type="text" id="submitted_by_name" name="submitted_by_name" class="form-input" placeholder="Dr. Jane Smith" required>
      </div>
      <div class="form-group">
        <label>Your Role *</label>
        <input type="text" id="submitted_by_role" name="submitted_by_role" class="form-input" placeholder="DDS, Treatment Coordinator, etc." required>
      </div>
      <div class="form-group">
        <label>Why Choose Our Office? (Optional)</label>
        <textarea id="why_choose_us" class="form-input" rows="3" placeholder="Highlight what makes your office the right choice..."></textarea>
      </div>
    </div>
  </div>

  <div class="actions-bar">
    <div id="errorMsg" hidden></div>
    <a href="office-cases.html" class="btn btn-outline">Cancel</a>
    <button type="button" id="submitBtn" class="btn btn-primary" onclick="handleSubmit()">Submit for Doctor Approval</button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL = 'https://fxfwytxfeuwsbeapiyqw.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4Znd5dHhmZXV3c2JlYXBpeXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ2NTk3MjksImV4cCI6MjA1MDIzNTcyOX0.anZxOWzcVyobPx8hW_DUpdIl1IAWeE-ANXpZq-ysXvI';
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const UUID_REGEX = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    const caseId = getQueryParam('case_id');
    const banner = document.getElementById('caseInfoBanner');

    if (caseId && UUID_REGEX.test(caseId)) {
      banner.textContent = 'Submitting estimate for Case ID: ' + caseId;
    } else {
      banner.style.background = '#fef2f2';
      banner.style.borderLeftColor = '#ef4444';
      banner.textContent = 'Warning: No valid case_id in URL. Access this page from Patient Cases.';
    }

    async function handleSubmit() {
      console.log('[DEBUG] handleSubmit() triggered');

      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn && submitBtn.disabled) return;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      if (!caseId || !UUID_REGEX.test(caseId)) {
        alert('Error: No valid case_id provided. Please access this page from a valid patient case.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit for Doctor Approval';
        return;
      }

      const low = parseFloat(document.getElementById('estimate_low').value) || 0;
      const high = parseFloat(document.getElementById('estimate_high').value) || 0;
      const treatment = document.getElementById('treatment_approach').value.trim();
      const submittedByName = document.getElementById('submitted_by_name').value.trim();
      const submittedByRole = document.getElementById('submitted_by_role').value.trim();
      const paymentOptions = document.getElementById('payment_options').value.trim();
      const availabilityNotes = document.getElementById('availability_notes').value.trim();
      const whyChooseUs = document.getElementById('why_choose_us').value.trim();

      if (!low || !high || !treatment || !submittedByName || !submittedByRole) {
        alert('Please fill in all required fields.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit for Doctor Approval';
        return;
      }

      const payload = {
        patient_case_id: caseId,
        office_id: null,
        submitted_by_name: submittedByName,
        submitted_by_role: submittedByRole,
        treatment_approach: treatment,
        low_estimate: low,
        high_estimate: high,
        payment_options: paymentOptions || null,
        availability_notes: availabilityNotes || null,
        why_choose_us: whyChooseUs || null,
        status: 'PENDING_DOCTOR_APPROVAL'
      };

      try {
        const result = await supabaseClient
          .from('estimates')
          .insert([payload])
          .select();

        if (result.error) {
          console.error('Supabase insert error:', result.error);
          showError(result.error.message);
          return;
        }

        if (typeof gtag === 'function') {
          gtag('event', 'submit_for_doctor_approval');
        }

        window.location.href = 'estimate-submitted.html?case_id=' + encodeURIComponent(caseId);

      } catch (err) {
        console.error('Unexpected submission error:', err);
        showError('Submission failed: ' + err.message);
      }
    }

    // Expose to onclick attribute
    window.handleSubmit = handleSubmit;

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = message;
      errorMsg.hidden = false;
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit for Doctor Approval';
    }
  </script>
</body>
</html>
