<div id="case-feed">
  <p style="text-align:center; color:#64748b; padding: 40px 0;">Loading cases&hellip;</p>
</div>

<div style="text-align:center; margin: 40px 0 80px;">
  <a href="office-dashboard.html" style="margin-right:16px;">&larr; Back to Dashboard</a>
  <a href="office-pending.html">View My Pending Estimates</a>
</div>

<p style="text-align:center; color:#64748b; font-size:0.85rem; padding-bottom:40px;">&copy; 2025 Dental Dash Pro. All rights reserved.</p>

<script type="module">
  import { supabase } from './supabase-config.js';

  if (typeof gtag === 'function') { gtag('event', 'view_case_feed'); }

  const feed = document.getElementById('case-feed');

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildDocTags(patientCase) {
    const tags = [];
    if (patientCase.uploaded_xrays)    tags.push('✓ X-Rays');
    if (patientCase.uploaded_findings) tags.push('✓ Clinical Findings');
    if (patientCase.uploaded_photos)   tags.push('✓ Photos');
    return tags.map(t => `<span class="doc-tag">${t}</span>`).join(' ');
  }

  function renderCase(patientCase) {
    const card = document.createElement('div');
    card.className = 'case-card';
    card.innerHTML = `
      <div class="case-category">${esc(patientCase.procedure_type) || 'General Dentistry'}</div>
      <h3 class="case-title">${esc(patientCase.procedure_type) || 'Patient Case'}</h3>
      <div class="case-meta">
        <div class="meta-item"><span class="meta-label">Location</span><span class="meta-val">${esc(patientCase.zip_code) || '—'}</span></div>
        <div class="meta-item"><span class="meta-label">Payment</span><span class="meta-val">${esc(patientCase.insurance_type) || '—'}</span></div>
      </div>
      ${patientCase.case_notes ? `<p class="case-summary">${esc(patientCase.case_notes)}</p>` : ''}
      <div class="doc-tags">
        ${buildDocTags(patientCase)}
      </div>
      <div class="card-footer">
        <a href="#" class="btn-card btn-outline">View Case</a>
        <a href="office-bid.html?case_id=${encodeURIComponent(patientCase.id)}" class="btn-card btn-primary-card" onclick="if(typeof gtag==='function') gtag('event','click_provide_estimate')">Provide Estimate</a>
      </div>
    `;
    return card;
  }

  const { data: patient_cases, error } = await supabase
    .from('patient_cases')
    .select('id, procedure_type, insurance_type, case_notes, zip_code, uploaded_xrays, uploaded_findings, uploaded_photos, status')
    .eq('status', 'SUBMITTED')
    .order('created_at', { ascending: false });

  if (error) {
    feed.innerHTML = '<p style="text-align:center; color:#e53e3e; padding: 40px 0;">Error loading cases. Please try again later.</p>';
    console.error('Error loading patient cases:', error);
  } else if (!patient_cases || patient_cases.length === 0) {
    feed.innerHTML = '<p style="text-align:center; color:#64748b; padding: 40px 0;">No cases available at this time.</p>';
  } else {
    feed.innerHTML = '';
    patient_cases.forEach(patientCase => feed.appendChild(renderCase(patientCase)));
  }
</script>
