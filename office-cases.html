<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLK6GWSVB4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PLK6GWSVB4');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Cases | DentalDash Pro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --primary-blue: #0f1c2e;
      --accent-blue: #3b82f6;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bg-light: #f8fafc;
      --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
    }
    body {
      background-color: #f1f5f9;
      margin: 0;
      padding-top: 64px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 1000;
    }
    .logo { font-weight: 800; color: var(--accent-blue); font-size: 1.25rem; text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-link { text-decoration: none; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
    .nav-link.active { color: var(--accent-blue); font-weight: 700; }

    .cases-container {
      max-width: 960px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 1.75rem; font-weight: 800; color: var(--primary-blue); margin: 0 0 8px; }
    .page-header p { color: var(--text-muted); font-size: 0.95rem; margin: 0; }

    .cases-grid {
      display: grid;
      gap: 20px;
    }
    .case-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .case-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .case-category {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-blue);
    }
    .case-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary-blue);
      margin: 4px 0 0;
    }
    .case-badge {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .badge-submitted { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
    .badge-urgent { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    .case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .meta-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }
    .meta-val {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .case-summary {
      font-size: 0.9rem;
      color: #475569;
      line-height: 1.6;
      margin: 0;
    }

    .doc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .doc-tag {
      font-size: 0.75rem;
      font-weight: 600;
      color: #15803d;
      background: #dcfce7;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 3px 10px;
    }

    .card-footer {
      display: flex;
      gap: 12px;
      padding-top: 4px;
    }
    .btn-card {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 700;
      text-decoration: none;
      transition: 0.15s;
    }
    .btn-primary-card {
      background: var(--accent-blue);
      color: white;
    }
    .btn-primary-card:hover { background: #2563eb; }
    .btn-outline {
      background: transparent;
      color: var(--accent-blue);
      border: 1.5px solid var(--accent-blue);
    }
    .btn-outline:hover { background: #eff6ff; }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.3rem; font-weight: 700; color: var(--primary-blue); margin: 0 0 8px; }
    .empty-state p { font-size: 0.95rem; margin: 0; }

    .loading-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .error-state {
      background: #fff1f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: #991b1b;
      font-size: 0.9rem;
    }

    .page-footer {
      text-align: center;
      margin-top: 40px;
      padding-bottom: 40px;
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }
    .page-footer a { color: var(--accent-blue); text-decoration: none; font-weight: 500; }
    .page-footer a:hover { text-decoration: underline; }
    .copyright { text-align: center; color: #94a3b8; font-size: 0.82rem; padding-bottom: 40px; }

    @media (max-width: 640px) {
      .top-nav { padding: 0 20px; }
      .nav-links { gap: 16px; }
      .cases-container { padding: 0 16px 60px; }
      .case-card { padding: 18px 20px; }
      .card-footer { flex-direction: column; }
      .btn-card { text-align: center; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="office-dashboard.html" class="logo">DentalDash</a>
    <div class="nav-links">
      <a href="office-dashboard.html" class="nav-link">Dashboard</a>
      <a href="office-cases.html" class="nav-link active">Patient Cases</a>
      <a href="office-pending.html" class="nav-link">My Estimates</a>
    </div>
  </nav>

  <main>
    <div class="cases-container">
      <div class="page-header">
        <h1>Available Patient Cases</h1>
        <p>Review submitted cases and provide estimates for patients in your area.</p>
      </div>

      <div id="casesFeed" class="cases-grid" role="list" aria-live="polite">
        <div class="loading-state">Loading cases&hellip;</div>
      </div>

      <div class="page-footer">
        <a href="office-dashboard.html">&larr; Back to Dashboard</a>
        <a href="office-pending.html">View My Pending Estimates</a>
      </div>
      <p class="copyright">&copy; 2025 Dental Dash Pro. All rights reserved.</p>
    </div>
  </main>

  <script type="module">
    import { supabase } from './supabase-config.js';

    const feed = document.getElementById('casesFeed');

    function clearFeed() {
      while (feed.firstChild) {
        feed.removeChild(feed.firstChild);
      }
    }

    function showEmpty() {
      clearFeed();
      const wrap = document.createElement('div');
      wrap.className = 'empty-state';

      const icon = document.createElement('div');
      icon.className = 'icon';
      icon.textContent = '📋';
      wrap.appendChild(icon);

      const heading = document.createElement('h2');
      heading.textContent = 'No cases available right now';
      wrap.appendChild(heading);

      const msg = document.createElement('p');
      msg.textContent = 'Check back soon — new patient cases are added regularly.';
      wrap.appendChild(msg);

      feed.appendChild(wrap);
    }

    function showError(message) {
      clearFeed();
      const err = document.createElement('div');
      err.className = 'error-state';
      err.textContent = message || 'Unable to load cases. Please try again later.';
      feed.appendChild(err);
    }

    function buildMetaItem(label, value) {
      const item = document.createElement('div');
      item.className = 'meta-item';

      const lbl = document.createElement('span');
      lbl.className = 'meta-label';
      lbl.textContent = label;
      item.appendChild(lbl);

      const val = document.createElement('span');
      val.className = 'meta-val';
      val.textContent = value;
      item.appendChild(val);

      return item;
    }

    function buildDocTag(label) {
      const tag = document.createElement('span');
      tag.className = 'doc-tag';
      tag.textContent = label;
      return tag;
    }

    function buildCaseCard(c) {
      const card = document.createElement('div');
      card.className = 'case-card';
      card.setAttribute('role', 'listitem');

      // Header: category + badge
      const header = document.createElement('div');
      header.className = 'case-card-header';

      const titleGroup = document.createElement('div');

      const category = document.createElement('div');
      category.className = 'case-category';
      category.textContent = c.procedure_type || 'Dental Case';
      titleGroup.appendChild(category);

      const title = document.createElement('h2');
      title.className = 'case-title';
      title.textContent = c.procedure_type || 'Patient Case';
      titleGroup.appendChild(title);

      header.appendChild(titleGroup);

      const badge = document.createElement('span');
      badge.className = 'case-badge badge-submitted';
      badge.textContent = 'New';
      header.appendChild(badge);

      card.appendChild(header);

      // Meta row
      const meta = document.createElement('div');
      meta.className = 'case-meta';

      if (c.zip_code) {
        meta.appendChild(buildMetaItem('Location', 'ZIP ' + c.zip_code));
      }
      if (c.insurance_type) {
        meta.appendChild(buildMetaItem('Payment', c.insurance_type));
      }

      if (meta.childElementCount > 0) {
        card.appendChild(meta);
      }

      // Summary (case_notes)
      if (c.case_notes) {
        const summary = document.createElement('p');
        summary.className = 'case-summary';
        summary.textContent = c.case_notes;
        card.appendChild(summary);
      }

      // Document tags
      const hasDocs = c.uploaded_xrays || c.uploaded_findings || c.uploaded_photos;
      if (hasDocs) {
        const tags = document.createElement('div');
        tags.className = 'doc-tags';
        if (c.uploaded_xrays)    tags.appendChild(buildDocTag('✓ X-Rays'));
        if (c.uploaded_findings) tags.appendChild(buildDocTag('✓ Clinical Findings'));
        if (c.uploaded_photos)   tags.appendChild(buildDocTag('✓ Photos'));
        card.appendChild(tags);
      }

      // Footer actions
      const footer = document.createElement('div');
      footer.className = 'card-footer';

      const estimateBtn = document.createElement('a');
      estimateBtn.className = 'btn-card btn-primary-card';
      estimateBtn.textContent = 'Provide Estimate';
      estimateBtn.setAttribute('href', 'office-bid.html?case_id=' + encodeURIComponent(c.id));
      estimateBtn.addEventListener('click', function () {
        if (typeof gtag === 'function') {
          gtag('event', 'click_provide_estimate', { case_id: c.id });
        }
      });
      footer.appendChild(estimateBtn);

      card.appendChild(footer);

      return card;
    }

    async function loadCases() {
      try {
        const { data, error } = await supabase
          .from('patient_cases')
          .select('id, procedure_type, insurance_type, case_notes, zip_code, uploaded_xrays, uploaded_findings, uploaded_photos, status, created_at')
          .eq('status', 'SUBMITTED')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Supabase error:', error.message);
          showError('Unable to load cases. Please try again later.');
          return;
        }

        if (!data || data.length === 0) {
          showEmpty();
          return;
        }

        clearFeed();
        data.forEach(function (caseRow) {
          feed.appendChild(buildCaseCard(caseRow));
        });

        if (typeof gtag === 'function') {
          gtag('event', 'view_case_feed', { case_count: data.length });
        }

      } catch (err) {
        console.error('Failed to load cases:', err);
        showError('Unable to load cases. Please try again later.');
      }
    }

    loadCases();
  </script>
</body>
</html>
